<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>MMA RPG</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%230b0b0b'/%3E%3Ctext x='50%25' y='56%25' text-anchor='middle' font-size='34' font-family='Arial,sans-serif' fill='%23ffd447'%3EM%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/style.css?v=36">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
    body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; height: 100dvh; overflow: hidden; touch-action: none; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; padding-top: env(safe-area-inset-top, 0px); padding-bottom: env(safe-area-inset-bottom, 0px); box-sizing: border-box; }

    /* Shell so UI overlays can anchor to the same centered area */
    #game-shell { position: relative; display: inline-block; max-width: 100vw; max-height: 100vh; }
    #game-container { max-width: 100vw; max-height: 100vh; }
    #game-container canvas { display: block; max-width: 100vw; max-height: 100vh; width: 100%; height: auto; -webkit-tap-highlight-color: transparent; }

    /* Mobile portrait: pin canvas to top, controls overlay bottom */
    @media (max-width: 768px) and (orientation: portrait) {
      body { align-items: flex-start; padding-top: env(safe-area-inset-top, 0px); }
      #game-shell { width: 100vw; }
      #game-container { width: 100vw; }
      #game-container canvas { width: 100vw !important; height: auto !important; }
    }

    /* UI layer (DOM) */
    #ui-layer { position: absolute; inset: 0; pointer-events: none; }

    /* D-pad (bottom-left) — positioned relative to viewport, not canvas */
    #dpad { position: fixed; left: 18px; bottom: 18px; width: 100px; height: 100px; pointer-events: auto; touch-action: none; display: none; z-index: 100; }
    #dpad .dpad-base {
      position: absolute; inset: 0;
      border-radius: 50%;
      background: rgba(80,80,100,0.55);
      border: 2px solid rgba(220,220,220,0.45);
      backdrop-filter: blur(1px);
      transform: scale(1);
      transition: transform 80ms ease;
    }
    #dpad .dpad-btn {
      position: absolute;
      width: 38px; height: 38px;
      border-radius: 10px;
      border: 0;
      background: rgba(120,120,120,0.55);
      color: rgba(255,255,255,0.92);
      font: 700 18px/38px monospace;
      text-align: center;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      transform: translateZ(0) scale(1);
      transition: transform 80ms ease, background 80ms ease;
    }
    #dpad .dpad-btn:active { transform: translateZ(0) scale(0.92); background: rgba(160,160,160,0.65); }
    /* Programmatic pressed state (touchmove across pad) */
    #dpad .dpad-btn.active { transform: translateZ(0) scale(0.92); background: rgba(160,160,160,0.65); }
    #dpad.active .dpad-base { transform: scale(0.98); transition: transform 80ms ease; }

    /* D-pad arrows: pixel positions for default 100px container, JS overrides for dynamic size */
    /* NO transform here — transform conflicted with JS left/top, causing UP to overlap LEFT */
    #dpad .dpad-up    { left: 31px; top: 6px; }
    #dpad .dpad-down  { left: 31px; bottom: 6px; }
    #dpad .dpad-left  { left: 6px;  top: 31px; }
    #dpad .dpad-right { right: 6px; top: 31px; }

    /* Action buttons (bottom-right circular cluster) */
    #action-cluster {
      position: fixed;
      right: 18px;
      bottom: 24px;
      pointer-events: auto;
      touch-action: none;
      display: none;
      z-index: 100;
      flex-direction: row;
      flex-wrap: nowrap;
      gap: 8px;
      align-items: center;
    }
    #action-cluster[style*="display: block"] {
      display: flex !important;
    }
    #action-cluster .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 5px;
      flex-shrink: 0;
    }
    #action-cluster .action-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4px;
      font: 700 9px/1.2 system-ui, sans-serif;
      box-sizing: border-box;
      border: 0;
      background-image: linear-gradient(145deg, rgba(255,255,255,0.18), rgba(40,40,40,0.9));
      box-shadow: 0 4px 10px rgba(0,0,0,0.45);
      color: rgba(255,255,255,0.94);
      letter-spacing: 0.03em;
      text-transform: uppercase;
      user-select: none;
      -webkit-user-select: none;
      transform: translateZ(0) scale(1);
      transition: transform 80ms ease, box-shadow 80ms ease, background-image 120ms ease;
    }
    #action-cluster .action-btn:active,
    #action-cluster .action-btn.active {
      transform: translateZ(0) scale(0.94);
      box-shadow: 0 2px 6px rgba(0,0,0,0.55);
      background-image: linear-gradient(145deg, rgba(255,255,255,0.30), rgba(20,20,20,0.95));
    }
    /* Cooldown overlay */
    #action-cluster .action-btn .cooldown-overlay {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.65);
      border-radius: 12px;
      pointer-events: none;
      transition: height 50ms linear;
      z-index: 0;
    }
    #action-cluster .action-btn.on-cooldown {
      background-image: linear-gradient(145deg, rgba(100,100,100,0.4), rgba(30,30,30,0.95));
      color: rgba(255,255,255,0.5);
    }

    #mobile-pause-btn {
      position: fixed;
      bottom: 200px;
      right: 12px;
      width: 42px;
      height: 42px;
      border-radius: 12px;
      border: 0;
      display: none;
      z-index: 200;
      background: rgba(20,20,20,0.72);
      color: #fff;
      font: 700 22px/42px system-ui, sans-serif;
      text-align: center;
      box-shadow: 0 3px 10px rgba(0,0,0,0.4);
      pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    #mobile-pause-btn:active { transform: scale(0.95); }

    #ground-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: none;
      pointer-events: none;
    }
    #ground-overlay .ground-text {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: #f3d36b;
      font: 800 24px/1.2 system-ui, sans-serif;
      letter-spacing: 0.08em;
      text-shadow: 0 2px 6px rgba(0,0,0,0.8);
    }
    #ground-timer {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 50px;
      width: 220px;
      height: 10px;
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      overflow: hidden;
    }
    #ground-timer-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #ffad33, #ff3d3d); }
    #ground-banner {
      position: absolute;
      left: 50%;
      top: 42%;
      transform: translate(-50%, -50%) scale(0.95);
      color: #ffffff;
      font: 900 42px/1 system-ui, sans-serif;
      opacity: 0;
      pointer-events: none;
      text-shadow: 0 4px 12px rgba(0,0,0,0.9);
      transition: all 180ms ease;
    }
    #ground-banner.active { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    
    /* Health Pulse Warning - red vignette when HP < 25% */
    #health-pulse-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      z-index: 25;
      box-shadow: inset 0 0 0 0 rgba(255, 0, 0, 0);
      transition: box-shadow 300ms ease;
    }
    #health-pulse-overlay.active {
      animation: healthPulse 800ms ease-in-out infinite;
    }
    
    /* Danger Warning Overlay - flashes screen edge for tactical warnings */
    #danger-warning-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      z-index: 28;
      transition: opacity 150ms ease;
    }
    #danger-warning-overlay.active {
      opacity: 1;
    }
    #danger-warning-overlay.active {
      animation: dangerFlash 300ms ease-in-out infinite;
    }
    /* Directional warning arrows */
    #danger-warning-overlay .danger-arrow {
      position: absolute;
      font-size: 32px;
      color: #ff6600;
      text-shadow: 0 0 10px #ff3300, 0 2px 4px rgba(0,0,0,0.8);
      opacity: 0;
      transition: opacity 150ms ease, transform 150ms ease;
      font-weight: bold;
    }
    #danger-warning-overlay.active .danger-arrow {
      opacity: 1;
      animation: dangerArrowPulse 400ms ease-in-out infinite;
    }
    #danger-warning-overlay .danger-left { left: 15px; top: 50%; transform: translateY(-50%); }
    #danger-warning-overlay .danger-right { right: 15px; top: 50%; transform: translateY(-50%); }
    #danger-warning-overlay .danger-top { left: 50%; top: 15px; transform: translateX(-50%); }
    #danger-warning-overlay .danger-bottom { left: 50%; bottom: 15px; transform: translateX(-50%); }
    
    /* Active direction highlighting */
    #danger-warning-overlay.danger-left .danger-left,
    #danger-warning-overlay.danger-right .danger-right,
    #danger-warning-overlay.danger-top .danger-top,
    #danger-warning-overlay.danger-bottom .danger-bottom {
      color: #ff3300;
      transform: translateY(-50%) scale(1.2);
      text-shadow: 0 0 20px #ff0000, 0 2px 4px rgba(0,0,0,0.8);
    }
    #danger-warning-overlay.danger-top .danger-top,
    #danger-warning-overlay.danger-bottom .danger-bottom {
      transform: translateX(-50%) scale(1.2);
    }
    
    /* Warning label */
    #danger-warning-overlay .danger-label {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      font-weight: bold;
      color: #ffcc00;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
      white-space: nowrap;
      opacity: 0;
      transition: opacity 150ms ease;
    }
    #danger-warning-overlay.active .danger-label {
      opacity: 1;
    }
    
    @keyframes dangerFlash {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
    @keyframes dangerArrowPulse {
      0%, 100% { transform: translateY(-50%) scale(1); }
      50% { transform: translateY(-50%) scale(1.15); }
    }
    
    /* Stamina Break Warning Overlay - flashes when enemy is about to stagger */
    #stamina-break-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      z-index: 28;
      transition: opacity 150ms ease;
    }
    #stamina-break-overlay.active {
      animation: staminaBreakFlash 400ms ease-in-out infinite;
    }
    @keyframes staminaBreakFlash {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 0.9; }
    }
    
    @keyframes healthPulse {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
    
    /* Screen Flash Overlay - colored flashes for different attack types */
    #screen-flash-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      z-index: 27;
      transition: opacity 50ms ease;
    }
    
    /* Mood Lighting Overlay - ambient color shifts based on combat state */
    #mood-lighting-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      z-index: 26;
      transition: opacity 800ms ease, background-color 1200ms ease;
    }
    /* Different mood states */
    #mood-lighting-overlay.mood-neutral { background-color: rgba(0, 0, 0, 0); opacity: 0; }
    #mood-lighting-overlay.mood-friendly { background-color: rgba(255, 180, 80, 0.08); opacity: 1; }
    #mood-lighting-overlay.mood-intense { background-color: rgba(100, 150, 255, 0.1); opacity: 1; }
    #mood-lighting-overlay.mood-boss { background-color: rgba(255, 50, 50, 0.15); opacity: 1; }
    #mood-lighting-overlay.mood-victory { background-color: rgba(255, 215, 0, 0.12); opacity: 1; }
    #mood-lighting-overlay.mood-defeat { background-color: rgba(80, 80, 80, 0.2); opacity: 1; }
    
    /* Weight Class Indicator - DOM-based HUD element */
    #weight-class-indicator {
      position: fixed;
      bottom: 180px;
      left: 50%;
      transform: translateX(-50%);
      padding: 4px 8px;
      background: rgba(0, 0, 0, 0.65);
      border-radius: 6px;
      font-size: 11px;
      color: #44ff88;
      z-index: 30;
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: transform 150ms ease, color 300ms ease;
    }
    
    /* Fight Timer Display - DOM-based countdown for timed challenges */
    #fight-timer-display {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 20px;
      background: rgba(0, 0, 0, 0.75);
      border-radius: 10px;
      font-family: 'Arial Black', 'Impact', sans-serif;
      font-size: 28px;
      color: #44ff44;
      z-index: 35;
      pointer-events: none;
      display: none;
      opacity: 0;
      transition: opacity 200ms ease, transform 150ms ease;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
      border: 2px solid rgba(68, 255, 68, 0.3);
    }
    
    /* Move Input Display - shows last 6 button inputs */
    #move-input-display {
      position: fixed;
      bottom: 190px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 12px;
      z-index: 32;
      pointer-events: none;
      opacity: 0;
      transition: opacity 200ms ease;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
    #move-input-display.visible {
      opacity: 1;
    }
    #move-input-display .input-slot {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      background: rgba(60, 60, 60, 0.6);
      transition: transform 100ms ease, background 100ms ease;
    }
    #move-input-display .input-slot.latest {
      transform: scale(1.15);
      background: rgba(80, 80, 80, 0.9);
      box-shadow: 0 0 8px rgba(255, 200, 80, 0.4);
    }
    #move-input-display .input-slot.strike { background: rgba(255, 80, 80, 0.5); }
    #move-input-display .input-slot.grapple { background: rgba(80, 120, 255, 0.5); }
    #move-input-display .input-slot.special { background: rgba(255, 200, 80, 0.5); }
    #move-input-display .input-slot.dodge { background: rgba(80, 255, 160, 0.5); }
    #move-input-display .input-slot.block { background: rgba(180, 180, 180, 0.5); }
    #fight-timer-display.visible {
      display: block;
      opacity: 1;
    }
    #fight-timer-display.warning {
      color: #ffaa00;
      border-color: rgba(255, 170, 0, 0.5);
      animation: timerPulse 400ms ease-in-out infinite;
    }
    #fight-timer-display.critical {
      color: #ff4444;
      border-color: rgba(255, 68, 68, 0.6);
      animation: timerPulse 250ms ease-in-out infinite;
    }
    #fight-timer-display .timer-label {
      font-size: 10px;
      font-family: 'Arial', sans-serif;
      font-weight: bold;
      color: #888;
      display: block;
      text-align: center;
      margin-bottom: 2px;
      letter-spacing: 2px;
    }
    @keyframes timerPulse {
      0%, 100% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.08); }
    }
    #weight-class-indicator .wc-icon {
      font-size: 14px;
    }
    #weight-class-indicator .wc-name {
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    #weight-class-indicator .wc-bonus {
      font-size: 9px;
      color: #888;
      margin-left: 4px;
    }
    #weight-class-indicator:hover {
      cursor: pointer;
    }
    
    /* Hype Meter - crowd engagement visualization */
    #hype-meter {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 6px 12px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 8px;
      z-index: 33;
      pointer-events: none;
      opacity: 0;
      transition: opacity 300ms ease;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255, 200, 0, 0.3);
    }
    #hype-meter.visible {
      opacity: 1;
    }
    #hype-meter .hype-bar-container {
      width: 80px;
      height: 12px;
      background: rgba(40, 40, 40, 0.8);
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
    #hype-meter .hype-bar-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #ffaa00, #ffdd00);
      border-radius: 6px;
      transition: width 200ms ease;
      box-shadow: 0 0 8px rgba(255, 200, 0, 0.5);
    }
    #hype-meter .hype-bar-fill.charged {
      background: linear-gradient(90deg, #ff4400, #ff8800, #ffdd00);
      animation: hypeGlow 500ms ease-in-out infinite;
    }
    @keyframes hypeGlow {
      0%, 100% { box-shadow: 0 0 8px rgba(255, 200, 0, 0.5); }
      50% { box-shadow: 0 0 16px rgba(255, 150, 0, 0.9); }
    }
    #hype-meter .hype-label {
      font-size: 10px;
      font-weight: bold;
      color: #ffcc00;
      letter-spacing: 1px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }
    
    #dom-restart-btn {
      position: absolute;
      left: 50%;
      bottom: 15%;
      transform: translateX(-50%);
      z-index: 40;
      display: none;
      pointer-events: auto;
      padding: 12px 22px;
      border-radius: 10px;
      border: 0;
      background: #ffd447;
      font-weight: 800;
    }

    @media (orientation: landscape) {
      #dpad { left: 10px; bottom: 10px; width: 88px; height: 88px; }
      #action-cluster { right: 10px; bottom: 10px; width: 238px; height: 118px; }
    }

    @media (pointer: fine) {
      /* Hide touch controls on desktop */
      #dpad { display: none; }
      #action-cluster { display: none; }
    }

    /* Touch portrait layout is handled entirely by ui-layout.js JS (absolute positioning).
       No CSS overrides needed here — they caused !important conflicts with JS inline styles. */
    @media (pointer: coarse) and (max-width: 600px) {
      /* Ensure cluster shows as flex when showTouchControls sets display:block */
      #action-cluster[style*="display: block"] {
        display: flex !important;
      }
      /* Placeholder to keep block non-empty; real layout done by JS */
      #action-cluster[style*="display: block"] .action-btn {
        /* Minimal fallback — JS overrides all of these via inline styles */
        height: 30px;
      }
    }
  </style>
</head>
<body>
  <div id="game-shell">
    <div id="game-container"></div>
    <!-- UI layer (mobile touch controls) -->
    <div id="ui-layer" aria-hidden="true">
      <div id="screen-flash-overlay"></div>
      <div id="health-pulse-overlay"></div>
      <div id="mood-lighting-overlay"></div>
      <div id="danger-warning-overlay">
        <div class="danger-arrow danger-left">◀</div>
        <div class="danger-arrow danger-right">▶</div>
        <div class="danger-arrow danger-top">▲</div>
        <div class="danger-arrow danger-bottom">▼</div>
        <div class="danger-label"></div>
      </div>
      <div id="stamina-break-overlay"></div>
      <div id="weight-class-indicator" title="Weight class affects speed/power" style="display:none">
        <span class="wc-icon">⚖️</span>
        <span class="wc-name">Featherweight</span>
        <span class="wc-bonus">+Speed</span>
      </div>
      <div id="fight-timer-display">
        <span class="timer-label">TIME</span>
        <span class="timer-value">00:00</span>
      </div>
      <!-- Hype Meter - crowd engagement bar -->
      <div id="hype-meter" title="Crowd hype boosts damage">
        <div class="hype-bar-container">
          <div class="hype-bar-fill"></div>
        </div>
        <span class="hype-label">HYPE</span>
      </div>
      <!-- Move Input Display - shows last 6 button inputs -->
      <div id="move-input-display">
        <div class="input-slot"></div>
        <div class="input-slot"></div>
        <div class="input-slot"></div>
        <div class="input-slot"></div>
        <div class="input-slot"></div>
        <div class="input-slot"></div>
      </div>
      <div id="ground-overlay"><div class="ground-text">GROUND GAME</div><div id="ground-timer"><div id="ground-timer-fill"></div></div></div>
      <div id="ground-banner">TAKEDOWN!</div>
      <button id="dom-restart-btn" type="button">RESTART (ENTER)</button>
    </div>
    <!-- Touch controls: OUTSIDE ui-layer so iOS Safari touch events aren't clipped -->
    <button id="mobile-pause-btn" type="button" aria-label="Pause menu">⚙️</button>
    <div id="dpad" class="touch-control" aria-label="D-pad">
      <div class="dpad-base"></div>
      <button class="dpad-btn dpad-up" data-dir="up" aria-label="Up">▲</button>
      <button class="dpad-btn dpad-down" data-dir="down" aria-label="Down">▼</button>
      <button class="dpad-btn dpad-left" data-dir="left" aria-label="Left">◀</button>
      <button class="dpad-btn dpad-right" data-dir="right" aria-label="Right">▶</button>
    </div>
    <button id="standup-btn" type="button" aria-label="Stand Up" style="position:fixed; left:130px; bottom:40px; width:60px; height:36px; border-radius:10px; border:0; background:rgba(100,100,200,0.7); color:#fff; font:bold 12px system-ui; pointer-events:auto; touch-action:none; display:none; z-index:100;">STAND</button>
    <div id="action-cluster" class="touch-control" aria-label="Action Buttons">
      <div class="action-grid" id="action-grid-left">
        <button class="action-btn" data-slot="1" data-action="hook" aria-label="Slot 1">Hook</button>
        <button class="action-btn" data-slot="2" data-action="jab" aria-label="Slot 2">Jab</button>
        <button class="action-btn" data-slot="3" data-action="cross" aria-label="Slot 3">Cross</button>
        <button class="action-btn" data-slot="4" data-action="lowKick" aria-label="Slot 4">Low Kick</button>
      </div>
      <div class="action-grid" id="action-grid-right">
        <button class="action-btn" data-slot="5" data-action="takedown" aria-label="Slot 5">Takedown</button>

  <script>
  // Prevent text selection and context menu on mobile (breaks gameplay)
  document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
  document.addEventListener('selectstart', function(e) { e.preventDefault(); return false; });

  // Unlock WebAudio on first user interaction (mobile tap/click)
  function unlockAudio(){
    try{
      if (window.MMA_AUDIO && typeof window.MMA_AUDIO.unlock === 'function') {
        // Preferred path: delegate to shared audio manager (creates/resumes
        // a single AudioContext that the rest of the game uses)
        window.MMA_AUDIO.unlock();
      } else {
        // Fallback: create a throwaway context just to satisfy autoplay
        var Ctor = window.AudioContext || window.webkitAudioContext;
        if (Ctor) {
          var ctx = new Ctor();
          if (ctx.state === 'suspended') {
            ctx.resume();
          }
          ctx.close();
        }
      }
    } catch (e) {
      console.warn('Audio unlock failed', e);
    }
    // Keep trying to resume audio on every interaction (iOS Safari is strict)
  }
  document.addEventListener('touchstart', unlockAudio);
  document.addEventListener('click', unlockAudio);
  
  // Keyboard shortcuts for desktop
  document.addEventListener('keydown', function(e) {
    // Only process if game is running
    if (!window.phaserGame || !window.phaserGame.scene || !window.phaserGame.scene.keys) return;
    
    var gameScene = window.phaserGame.scene.keys.GameScene;
    var isGameActive = gameScene && gameScene.scene && gameScene.scene.isActive && gameScene.scene.isActive();
    
    // C key = Fighter Card toggle
    if (e.key === 'c' || e.key === 'C') {
      if (isGameActive && gameScene.player && !gameScene.paused && !gameScene.gameOver) {
        if (gameScene.activeFighterCard && gameScene.activeFighterCard.close) {
          gameScene.activeFighterCard.close();
        } else {
          if (typeof window.MMA.UI.showFighterCard === 'function') gameScene.activeFighterCard = window.MMA.UI.showFighterCard(gameScene);
        }
      }
    }
    // T key = Trophy Room toggle
    if (e.key === 't' || e.key === 'T') {
      if (isGameActive && gameScene.player && !gameScene.paused && !gameScene.gameOver) {
        if (gameScene.activeTrophyRoom && gameScene.activeTrophyRoom.close) {
          gameScene.activeTrophyRoom.close();
        } else {
          if (typeof window.MMA.UI.showTrophyRoom === 'function') gameScene.activeTrophyRoom = window.MMA.UI.showTrophyRoom(gameScene);
        }
      }
    }
    // D key = Fighter's Diary toggle
    if (e.key === 'd' || e.key === 'D') {
      if (isGameActive && gameScene.player && !gameScene.paused && !gameScene.gameOver) {
        if (gameScene.activeFighterDiary && gameScene.activeFighterDiary.close) {
          gameScene.activeFighterDiary.close();
        } else {
          if (typeof window.MMA.UI.showFighterDiary === 'function') gameScene.activeFighterDiary = window.MMA.UI.showFighterDiary(gameScene);
        }
      }
    }
    // K key = KO Gallery toggle
    if (e.key === 'k' || e.key === 'K') {
      if (isGameActive && gameScene.player && !gameScene.paused && !gameScene.gameOver) {
        if (gameScene.activeKOGallery && gameScene.activeKOGallery.close) {
          gameScene.activeKOGallery.close();
        } else {
          if (typeof window.MMA.UI.showKOGallery === 'function') gameScene.activeKOGallery = window.MMA.UI.showKOGallery(gameScene);
        }
      }
    }
    // N key = Style DNA toggle
    if (e.key === 'n' || e.key === 'N') {
      if (isGameActive && gameScene.player && !gameScene.paused && !gameScene.gameOver) {
        if (gameScene.activeStyleDNA && gameScene.activeStyleDNA.close) {
          gameScene.activeStyleDNA.close();
        } else {
          if (typeof window.MMA.UI.showStyleDNA === 'function') gameScene.activeStyleDNA = window.MMA.UI.showStyleDNA(gameScene);
        }
      }
    }
    // L key = Legacy Records toggle
    if (e.key === 'l' || e.key === 'L') {
      if (isGameActive && gameScene.player && !gameScene.paused && !gameScene.gameOver) {
        if (gameScene.activeLegacyRecords && gameScene.activeLegacyRecords.close) {
          gameScene.activeLegacyRecords.close();
        } else {
          if (typeof window.MMA.UI.showLegacyRecords === 'function') gameScene.activeLegacyRecords = window.MMA.UI.showLegacyRecords(gameScene);
        }
      }
    }
  });
  
  // Periodic stamina and health warning check (every 500ms when game is active)
  setInterval(function() {
    if (!window.phaserGame || !window.phaserGame.scene || !window.phaserGame.scene.keys) return;
    var gameScene = window.phaserGame.scene.keys.GameScene;
    var isGameActive = gameScene && gameScene.scene && gameScene.scene.isActive && gameScene.scene.isActive();
    if (isGameActive && gameScene.player && gameScene.player.stats && !gameScene.paused && !gameScene.gameOver) {
      window.MMA.UI.checkStaminaWarning(gameScene, gameScene.player.stats.stamina, gameScene.player.stats.maxStamina);
      window.MMA.UI.updateHealthPulse(gameScene, gameScene.player.stats.hp, gameScene.player.stats.maxHp);
      // Update weight class indicator (guard: function may not exist yet)
      if (typeof window.MMA.UI.updateWeightClassFromDOM === 'function') window.MMA.UI.updateWeightClassFromDOM(gameScene.player.stats);
      // Check for danger warnings (coordinated attacks, special moves)
      if (typeof window.MMA.UI.checkDangerWarnings === 'function') window.MMA.UI.checkDangerWarnings(gameScene);
    }
  }, 500);
  
  // Danger Proximity Warning System
  (function() {
    var dangerState = {
      active: false,
      direction: null, // 'left', 'right', 'top', 'bottom'
      warningType: null, // 'coordination', 'special', 'gangup'
      timeoutId: null,
      lastWarningTime: 0,
      cooldownMs: 2000 // Minimum time between warnings
    };
    
    var overlay = null;
    var labelEl = null;
    
    function getOverlay() {
      if (!overlay) overlay = document.getElementById('danger-warning-overlay');
      return overlay;
    }
    
    function getLabel() {
      if (!labelEl) {
        var ov = getOverlay();
        if (ov) labelEl = ov.querySelector('.danger-label');
      }
      return labelEl;
    }
    
    function clearDirectionClasses(ov) {
      if (!ov) return;
      ov.classList.remove('danger-left', 'danger-right', 'danger-top', 'danger-bottom');
    }
    
    function showDangerWarning(direction, warningType, label) {
      var now = Date.now();
      if (now - dangerState.lastWarningTime < dangerState.cooldownMs) return;
      dangerState.lastWarningTime = now;
      
      var ov = getOverlay();
      if (!ov) return;
      
      // Clear any existing timeout
      if (dangerState.timeoutId) {
        clearTimeout(dangerState.timeoutId);
      }
      
      // Set direction and label
      clearDirectionClasses(ov);
      if (direction) {
        ov.classList.add('danger-' + direction);
      }
      ov.classList.add('active');
      
      var lbl = getLabel();
      if (lbl && label) {
        lbl.textContent = label;
      }
      
      dangerState.active = true;
      dangerState.direction = direction;
      dangerState.warningType = warningType;
      
      // Auto-hide after 1.5 seconds
      dangerState.timeoutId = setTimeout(function() {
        hideDangerWarning();
      }, 1500);
    }
    
    function hideDangerWarning() {
      var ov = getOverlay();
      if (ov) {
        ov.classList.remove('active');
        clearDirectionClasses(ov);
      }
      var lbl = getLabel();
      if (lbl) lbl.textContent = '';
      dangerState.active = false;
      dangerState.direction = null;
      dangerState.warningType = null;
    }
    
    // Main danger check function - exposed to MMA.UI
    window.MMA = window.MMA || {};
    window.MMA.UI = window.MMA.UI || {};
    window.MMA.UI.checkDangerWarnings = function(gameScene) {
      if (!gameScene || !gameScene.enemies || !gameScene.player) return;
      
      var player = gameScene.player;
      var enemies = gameScene.enemies;
      var px = player.x || 0;
      var py = player.y || 0;
      
      // Check for coordinated attack preparation (multiple enemies charging)
      var chargingEnemies = [];
      var specialEnemies = [];
      
      enemies.forEach(function(enemy) {
        if (!enemy || !enemy.active) return;
        
        var ex = enemy.x || 0;
        var ey = enemy.y || 0;
        var dist = Math.sqrt((ex - px) * (ex - px) + (ey - py) * (ey - py));
        
        // Check if enemy is preparing a special move (telegraph state)
        var isTelegraphing = enemy.isTelegraphing || (enemy.state && enemy.state.includes('telegraph'));
        var isCharging = enemy.isCharging || enemy.chargeTime > 0;
        var isSpecial = enemy.isUsingSpecial || (enemy.currentMove && enemy.currentMove.isSpecial);
        
        if (dist < 250) { // Only care about nearby enemies
          if (isTelegraphing || isCharging) {
            chargingEnemies.push({ enemy: enemy, x: ex, y: ey });
          }
          if (isSpecial) {
            specialEnemies.push({ enemy: enemy, x: ex, y: ey });
          }
        }
      });
      
      // If multiple enemies are charging, show gang-up warning
      if (chargingEnemies.length >= 2) {
        // Find the most dangerous direction (closest enemy)
        var closest = chargingEnemies[0];
        var minDist = 9999;
        chargingEnemies.forEach(function(e) {
          var d = Math.sqrt((e.x - px) * (e.x - px) + (e.y - py) * (e.y - py));
          if (d < minDist) {
            minDist = d;
            closest = e;
          }
        });
        
        var dir = null;
        if (closest) {
          var dx = closest.x - px;
          var dy = closest.y - py;
          if (Math.abs(dx) > Math.abs(dy)) {
            dir = dx > 0 ? 'right' : 'left';
          } else {
            dir = dy > 0 ? 'bottom' : 'top';
          }
        }
        
        showDangerWarning(dir, 'gangup', '⚔️ GANG-UP!');
        return;
      }
      
      // If one enemy is using a special move, show special attack warning
      if (specialEnemies.length > 0) {
        var special = specialEnemies[0];
        var dx = special.x - px;
        var dy = special.y - py;
        var dir = null;
        if (Math.abs(dx) > Math.abs(dy)) {
          dir = dx > 0 ? 'right' : 'left';
        } else {
          dir = dy > 0 ? 'bottom' : 'top';
        }
        
        var moveName = special.enemy.currentMove ? special.enemy.currentMove.name || 'SPECIAL' : 'SPECIAL';
        showDangerWarning(dir, 'special', '⚡ ' + moveName.toUpperCase());
        return;
      }
      
      // Single enemy telegraph warning
      if (chargingEnemies.length === 1) {
        var enemy = chargingEnemies[0];
        var dx = enemy.x - px;
        var dy = enemy.y - py;
        var dir = null;
        if (Math.abs(dx) > Math.abs(dy)) {
          dir = dx > 0 ? 'right' : 'left';
        } else {
          dir = dy > 0 ? 'bottom' : 'top';
        }
        
        // Get move type for label
        var moveType = 'ATTACK';
        if (enemy.enemy.currentMove) {
          var mt = enemy.enemy.currentMove.moveType || enemy.enemy.currentMove.type;
          if (mt === 'grapple' || mt === 'submission') moveType = 'GRAPPLE';
          else if (mt === 'special') moveType = 'SPECIAL';
          else moveType = 'STRIKE';
        }
        
        showDangerWarning(dir, 'coordination', moveType + ' INCOMING');
      }
    };
    
    // Manual trigger for testing (also called from combat events)
    window.MMA.UI.triggerDangerWarning = function(direction, label) {
      showDangerWarning(direction, 'manual', label || 'WARNING!');
    };
  })();
  // Start game on first tap (mobile) after audio unlock
  document.addEventListener('touchstart', function(){
    var btn = document.getElementById('dom-start-btn');
    if (btn) btn.click();
  }, {once:true});
</script>

<script>
  // Global touch state (read by Phaser scenes)
  window.MMA_TOUCH = window.MMA_TOUCH || { up:false, down:false, left:false, right:false };

  (function setupDpad(){
    var dpad = document.getElementById('dpad');
    if (!dpad) return;

    var buttons = {
      up: dpad.querySelector('.dpad-up'),
      down: dpad.querySelector('.dpad-down'),
      left: dpad.querySelector('.dpad-left'),
      right: dpad.querySelector('.dpad-right')
    };

    // Ensure global touch state exists
    window.MMA_TOUCH = window.MMA_TOUCH || { up:false, down:false, left:false, right:false };

    function clearAll(){
      window.MMA_TOUCH.up = window.MMA_TOUCH.down = window.MMA_TOUCH.left = window.MMA_TOUCH.right = false;
      Object.keys(buttons).forEach(function(k){ if (buttons[k]) buttons[k].classList.remove('active'); });
      dpad.classList.remove('active');
    }

    function setSingle(dir){
      clearAll();
      if (dir && window.MMA_TOUCH.hasOwnProperty(dir)) {
        window.MMA_TOUCH[dir] = true;
        if (buttons[dir]) buttons[dir].classList.add('active');
        dpad.classList.add('active');
      }
    }

    function dirFromClientXY(clientX, clientY){
      var r = dpad.getBoundingClientRect();
      var cx = r.left + r.width/2;
      var cy = r.top + r.height/2;
      var dx = clientX - cx;
      var dy = clientY - cy;
      var adx = Math.abs(dx);
      var ady = Math.abs(dy);
      // Deadzone near center
      if (Math.sqrt(dx*dx + dy*dy) < 14) return null;
      if (adx > ady) return dx < 0 ? 'left' : 'right';
      return dy < 0 ? 'up' : 'down';
    }

    // Track a single active touch so swipes/dragging across the pad work.
    var activeTouchId = null;

    function onTouchStart(e){
      if (!e.changedTouches || !e.changedTouches.length) return;
      var t = e.changedTouches[0];
      activeTouchId = t.identifier;
      var dir = dirFromClientXY(t.clientX, t.clientY);
      setSingle(dir);
      e.preventDefault();
    }

    function onTouchMove(e){
      if (activeTouchId === null || !e.touches) return;
      for (var i=0; i<e.touches.length; i++) {
        var t = e.touches[i];
        if (t.identifier === activeTouchId) {
          var dir = dirFromClientXY(t.clientX, t.clientY);
          setSingle(dir);
          e.preventDefault();
          return;
        }
      }
    }

    function onTouchEnd(e){
      if (activeTouchId === null) return;
      if (!e.changedTouches) { clearAll(); activeTouchId = null; return; }
      for (var i=0; i<e.changedTouches.length; i++) {
        if (e.changedTouches[i].identifier === activeTouchId) {
          clearAll();
          activeTouchId = null;
          e.preventDefault();
          return;
        }
      }
    }

    dpad.addEventListener('touchstart', onTouchStart, {passive:false});
    dpad.addEventListener('touchmove', onTouchMove, {passive:false});
    dpad.addEventListener('touchend', onTouchEnd, {passive:false});
    dpad.addEventListener('touchcancel', function(){ clearAll(); activeTouchId = null; });

    // Mouse fallback (desktop testing): click/drag within the pad.
    var mouseDown = false;
    dpad.addEventListener('mousedown', function(e){
      mouseDown = true;
      setSingle(dirFromClientXY(e.clientX, e.clientY));
      e.preventDefault();
    });
    window.addEventListener('mousemove', function(e){
      if (!mouseDown) return;
      setSingle(dirFromClientXY(e.clientX, e.clientY));
    });
    window.addEventListener('mouseup', function(){
      mouseDown = false;
      clearAll();
    });

    // Safety: if focus leaves, stop movement
    window.addEventListener('blur', function(){
      clearAll();
      activeTouchId = null;
      mouseDown = false;
    });
  })();

  // Action buttons handling
  (function setupActions(){
    var cluster = document.getElementById('action-cluster');
    if (!cluster) return;
    if (!window.MMA_ACTION) window.MMA_ACTION = {};
    ['jab','cross','hook','lowKick','uppercut','headKick','bodyShot','takedown','guillotine','special','standup'].forEach(function(m){ if(window.MMA_ACTION[m]===undefined) window.MMA_ACTION[m]=false; });
    if (!window.MMA_LOADOUT) {
      var _saved = null;
      try { _saved = JSON.parse(localStorage.getItem('mma_loadout')); } catch(e){}
      window.MMA_LOADOUT = _saved || {1:'hook',2:'jab',3:'cross',4:'lowKick',5:'takedown',6:'special',7:'headKick',8:'guillotine'};
    }
    function applyLoadout() {
      if (!window.MMA_LOADOUT) return;
      Object.keys(window.MMA_LOADOUT).forEach(function(slot) {
        var btn = document.querySelector('[data-slot="' + slot + '"]');
        if (!btn) return;
        var moveKey = window.MMA_LOADOUT[slot];
        btn.setAttribute('data-action', moveKey);
        var label = moveKey.replace(/([A-Z])/g, ' $1').replace(/^./, function(s){return s.toUpperCase();});
        btn.textContent = label;
        btn.setAttribute('aria-label', 'Slot ' + slot + ': ' + label);
      });
    }
    applyLoadout();
    function setAction(action, on){
      window.MMA_ACTION[action] = !!on;
    }
    function bind(btn){
      function currentAction(){
        return btn.getAttribute('data-action');
      }
      btn.addEventListener('touchstart', function(e){
        e.preventDefault();
        setAction(currentAction(), true);
        btn.style.transform = 'translateZ(0) scale(0.92)';
      }, {passive:false});
      btn.addEventListener('touchend', function(e){
        e.preventDefault();
        setAction(currentAction(), false);
        btn.style.transform = '';
      }, {passive:false});
      btn.addEventListener('touchcancel', function(){
        setAction(currentAction(), false);
        btn.style.transform = '';
      });
      btn.addEventListener('mousedown', function(e){
        e.preventDefault();
        setAction(currentAction(), true);
        btn.style.transform = 'translateZ(0) scale(0.92)';
      });
      window.addEventListener('mouseup', function(){
        setAction(currentAction(), false);
        btn.style.transform = '';
      });
    }
    Array.prototype.slice.call(cluster.querySelectorAll('.action-btn')).forEach(bind);
    window.addEventListener('blur', function(){
      ['jab','cross','hook','lowKick','uppercut','headKick','bodyShot','takedown','guillotine','special'].forEach(function(m){window.MMA_ACTION[m]=false;});
    });
    // Standup button binding
    var standBtn = document.getElementById('standup-btn');
    if (standBtn) {
      standBtn.addEventListener('touchstart', function(e) { e.preventDefault(); window.MMA_ACTION.standup = true; }, {passive:false});
      standBtn.addEventListener('touchend', function(e) { e.preventDefault(); window.MMA_ACTION.standup = false; }, {passive:false});
      standBtn.addEventListener('click', function(e) { e.preventDefault(); window.MMA_ACTION.standup = true; setTimeout(function(){ window.MMA_ACTION.standup = false; }, 100); });
    }
  })();
</script>
